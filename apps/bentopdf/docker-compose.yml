x-runtipi:
  schema_version: 2

services:
  bentopdf:
    # simple mode - bentopdf/bentopdf-simple:latest
    # default mode - bentopdf/bentopdf:latest
    image: ghcr.io/alam00000/bentopdf:v2.8.1
    container_name: bentopdf
    x-runtipi:
      is_main: true
      internal_port: 8080
    restart: unless-stopped
    ports:
      - ${APP_PORT}:8080
    networks:
      - bentopdf

networks:
  bentopdf:
