x-runtipi:
  schema_version: 2

services:
  linkding:
    image: sissbruecker/linkding:1.45.0
    container_name: linkding
    x-runtipi:
      is_main: true
      internal_port: 9090
    ports:
      - "${APP_PORT}:9090"
    volumes:
      - ${APP_DATA_DIR}:/etc/linkding/data
    environment:
      - LD_SUPERUSER_NAME=${LD_SUPERUSER_NAME}
      - LD_SUPERUSER_PASSWORD=${LD_SUPERUSER_PASSWORD}
    restart: unless-stopped
