services:
  server:
    container_name: nominatim-api
    image: mediagis/nominatim:5.1
    secrets:
      - nominatim_key
    restart: unless-stopped
    ports:
      - ${SERVER_PORT}:8080
    environment:
      SERVER_PORT: 8123
      PBF_URL: ${PBF_URL}
      # PBF_PATH: ${PBF_PATH}
      REPLICATION_URL: ${REPLICATION_URL}
      NOMINATIM_PASSWORD_FILE: /run/secrets/nominatim_key
      UPDATE_MODE: catch-up
      IMPORT_STYLE: full
      USER_UID: 1001
      USER_GID: 1001
      WARMUP_ON_STARTUP: true
    volumes:
      - ${APP_DATA_DIR}/data/nominatim/:/var/lib/postgresql/16/main
    shm_size: 128mb
    healthcheck:
      test: 'curl -f http://127.0.0.1:8080/status || exit 1'
      interval: 300s
    networks:
      - nominatim

  ui:
    container_name: nominatim-ui
    image: ghcr.io/camille-s/nominatim-ui:latest
    depends_on:
      - nominatim-api
    restart: unless-stopped
    ports:
      - ${APP_PORT}:80

secrets:
  nominatim_key:
    file: ./keys/nominatim_key.txt

networks:
  nominatim:
